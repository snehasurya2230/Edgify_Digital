  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tide:  linear-gradient(95deg, #5BC4EE 0%, #3BA7DE 50%, #2A7BC5 100%);\n  --grad-edge:  linear-gradient(95deg, #5BC4EE 0%, #3BA7DE 38%, #FF8A3D 62%, #E84141 100%);\n  --grad-edge-soft: linear-gradient(135deg, rgba(91,196,238,0.16) 0%, rgba(255,138,61,0.16) 100%);\n\n  /* ==========================================================\n     2. NEUTRALS — warm ink scale\n     ========================================================== */\n  --ink-1000: #06080D;   /* deepest — outer canvas */\n  --ink-950:  #0A1422;   /* premium navy-black */\n  --ink-900:  #0F1B2D;   /* surface 1 */\n  --ink-800:  #182438;   /* surface 2 */\n  --ink-700:  #243349;   /* card border on dark */\n  --ink-600:  #36465E;\n  --ink-500:  #56657D;\n  --ink-400:  #7A879C;\n  --ink-300:  #A4AEBF;\n  --ink-200:  #CFD5E0;\n  --ink-100:  #E6E9EF;\n  --ink-50:   #F1F3F7;\n\n  /* Warm paper (light theme + print) */\n  --paper:        #F6F2EA;\n  --paper-soft:   #FBF8F2;\n  --paper-deep:   #ECE5D6;\n\n  /* ==========================================================\n     3. SEMANTIC TOKENS — dark theme (default)\n     ========================================================== */\n  --bg:           var(--ink-1000);\n  --bg-elev-1:    var(--ink-950);\n  --bg-elev-2:    var(--ink-900);\n  --bg-elev-3:    var(--ink-800);\n\n  --fg-1:         #F3F1EC;       /* primary text on dark */\n  --fg-2:         #BCC4D2;       /* secondary */\n  --fg-3:         #7A879C;       /* tertiary, meta */\n  --fg-4:         #56657D;       /* placeholder, disabled */\n\n  --line:         rgba(255,255,255,0.08);\n  --line-strong:  rgba(255,255,255,0.16);\n\n  --brand:        var(--ember-400);\n  --brand-alt:    var(--tide-400);\n  --brand-grad:   var(--grad-edge);\n\n  --success: #2DBB7B;\n  --warning: #F2B441;\n  --danger:  #E84141;\n  --info:    var(--tide-300);\n\n  /* Chart accents (orderly, brand-coherent) */\n  --chart-1: var(--ember-400);\n  --chart-2: var(--tide-300);\n  --chart-3: var(--tide-500);\n  --chart-4: var(--ember-200);\n  --chart-5: #8B6BD9;     /* one neutral accent for variety */\n  --chart-6: #2DBB7B;\n\n  /* ==========================================================\n     4. TYPOGRAPHY — families & scale\n     ========================================================== */\n  --font-display: 'Instrument Serif', 'Cormorant Garamond', 'Times New Roman', serif;\n  --font-sans:    'Geist', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Modular scale — major-third on display, minor-third on body */\n  --fs-display-3xl: 96px;\n  --fs-display-2xl: 72px;\n  --fs-display-xl:  56px;\n  --fs-display-lg:  44px;\n  --fs-display-md:  34px;\n\n  --fs-h1: 40px;\n  --fs-h2: 30px;\n  --fs-h3: 22px;\n  --fs-h4: 18px;\n  --fs-lg: 18px;\n  --fs-md: 16px;\n  --fs-sm: 14px;\n  --fs-xs: 12px;\n\n  --lh-tight:   1.05;\n  --lh-snug:    1.18;\n  --lh-normal:  1.45;\n  --lh-relaxed: 1.6;\n\n  --tracking-tight: -0.022em;\n  --tracking-snug:  -0.012em;\n  --tracking-flat:  0;\n  --tracking-wide:  0.06em;\n  --tracking-eyebrow: 0.18em;\n\n  /* ==========================================================\n     5. SPACING, RADIUS, SHADOW, MOTION\n     ========================================================== */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 12px;\n  --radius-lg: 18px;\n  --radius-xl: 28px;\n  --radius-pill: 999px;\n\n  /* Shadows — used sparingly. Dark theme prefers borders + inner glow;\n     light theme uses warm subtle drops. */\n  --shadow-sm:  0 1px 2px rgba(7, 12, 22, 0.32);\n  --shadow-md:  0 6px 18px rgba(7, 12, 22, 0.38);\n  --shadow-lg:  0 20px 48px rgba(7, 12, 22, 0.5);\n  --shadow-glow-ember: 0 0 0 1px rgba(255,106,61,0.35), 0 12px 40px -8px rgba(255,106,61,0.45);\n  --shadow-glow-tide:  0 0 0 1px rgba(91,196,238,0.30), 0 12px 40px -8px rgba(91,196,238,0.40);\n\n  /* Light-theme print shadows */\n  --shadow-paper-sm: 0 1px 2px rgba(50, 32, 18, 0.06);\n  --shadow-paper-md: 0 8px 24px rgba(50, 32, 18, 0.08);\n\n  /* Motion */\n  --ease-out:  cubic-bezier(0.2, 0.7, 0.2, 1);\n  --ease-in:   cubic-bezier(0.6, 0, 0.85, 0.4);\n  --ease-snap: cubic-bezier(0.16, 1, 0.3, 1);\n  --dur-fast:   140ms;\n  --dur-base:   240ms;\n  --dur-slow:   420ms;\n}\n\n/* Light / paper theme — used by Brochure, Visiting Card, print collateral */\n[data-theme=\"paper\"] {\n  --bg:        var(--paper);\n  --bg-elev-1: var(--paper-soft);\n  --bg-elev-2: #FFFFFF;\n  --bg-elev-3: #FFFFFF;\n  --fg-1: #11161E;\n  --fg-2: #3A4351;\n  --fg-3: #6E7886;\n  --fg-4: #A2ABB8;\n  --line:        rgba(15, 22, 36, 0.10);\n  --line-strong: rgba(15, 22, 36, 0.22);\n}\n\n/* ============================================================\n   SEMANTIC ELEMENT STYLES — opt-in via class .edg-prose\n   or by applying tokens directly to your own selectors.\n   ============================================================ */\n\n.edg-prose h1, .edg-display-1 {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: var(--fs-display-2xl);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n}\n.edg-prose h2, .edg-display-2 {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: var(--fs-display-lg);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-tight);\n}\n.edg-prose h3, .edg-h3 {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: var(--fs-h3);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-snug);\n}\n.edg-prose h4, .edg-h4 {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--fs-h4);\n  line-height: var(--lh-snug);\n}\n.edg-prose p, .edg-body {\n  font-family: var(--font-sans);\n  font-weight: 400;\n  font-size: var(--fs-md);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-2);\n}\n.edg-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--fs-xs);\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-eyebrow);\n  color: var(--fg-3);\n}\n.edg-data {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: -0.01em;\n}\n\n/* Signature gradient text */\n.edg-grad-text {\n  background: var(--grad-edge);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.edg-grad-text-ember {\n  background: var(--grad-ember);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.edg-grad-text-tide {\n  background: var(--grad-tide);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n<\u002Fstyle>\n<script src=\"8233a606-db55-4c69-aad5-fbd474b1e991\"><\u002Fscript>\n\n<style>\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0;\n    background: #1a1a1a;\n    padding: 32px 0 64px;\n    font-family: var(--font-sans);\n    color: #11161E;\n  }\n  .stage { display: flex; flex-direction: column; align-items: center; gap: 28px; }\n\n  .sheet-label {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.45);\n    align-self: flex-start;\n    margin-left: max(32px, calc(50% - 561px));\n  }\n\n  /* A4 landscape at 96dpi: 297 × 210 mm = 1123 × 794 px. We use 1122 for clean /3 = 374 panels. */\n  .sheet {\n    width: 1122px;\n    height: 794px;\n    background: var(--paper);\n    color: #11161E;\n    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);\n    position: relative;\n    display: grid;\n    grid-template-columns: 374px 374px 374px;\n    overflow: hidden;\n  }\n\n  .panel { position: relative; overflow: hidden; }\n  .panel + .panel { border-left: 1px dashed rgba(15,22,36,0.10); }\n  .sheet.dark .panel + .panel { border-left-color: rgba(255,255,255,0.10);
